<!DOCTYPE html>
<html>
<head>
<title>RAPVERSE V7.3 FINAL</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{background:#0A0A0A;color:#fff;font-family:'Segoe UI',Arial;padding:20px 15px 80px 15px;}
.container{max-width:700px;margin:auto;}
h1{color:#FFD700;text-align:center;font-size:38px;margin-bottom:5px;} h1 span{color:#00BFFF;}
.card{background:#111;border:1px solid #222;border-radius:20px;padding:18px;margin:15px 0;}
.btn{background:#FFD700;color:#000;border:none;padding:15px;font-size:17px;border-radius:50px;font-weight:bold;cursor:pointer;width:100%;margin:10px 0;}
.btn-blue{background:#00BFFF;color:#000;}
.btn-small{background:transparent;color:#666;border:1px solid #333;padding:10px;font-size:12px;width:auto;margin:20px auto 0 auto;display:block;}
.btn:disabled{background:#444;}
input,textarea,select{width:100%;background:#1A1A1A;color:#fff;border:1px solid #333;border-radius:10px;padding:12px;font-size:16px;margin:8px 0;box-sizing:border-box;}
textarea#lyrics{height:220px;font-family:monospace;}
label{color:#FFD700;font-weight:bold;display:block;margin-top:10px;font-size:14px;}
.credits{color:#00BFFF;font-size:20px;text-align:center;font-weight:bold;}
.hidden{display:none;}
.song-item{background:#1A1A1A;padding:12px;border-radius:12px;margin:10px 0;}
audio{width:100%;margin-top:8px;}

/* BARRE DE CHARGEMENT */
.progress-bar{width:100%;background:#222;border-radius:10px;overflow:hidden;margin:15px 0;height:20px;}
.progress-fill{height:100%;width:0%;background:linear-gradient(90deg, #FFD700, #00BFFF);transition: width 0.4s ease; text-align:center;color:#000;font-weight:bold;font-size:12px;line-height:20px;}
</style>
</head>
<body>
<div class="container">

<h1>RAP<span>VERSE</span></h1>

<div id="loginBox" class="card">
  <h3>Connexion / Inscription</h3>
  <input type="email" id="email" placeholder="Ton email">
  <input type="password" id="password" placeholder="Mot de passe">
  <button class="btn" onclick="signup()">S'INSCRIRE +5 CRÉDITS</button>
  <button class="btn" onclick="login()">SE CONNECTER</button>
</div>

<div id="appBox" class="hidden">
  <div class="card">
    <p class="credits">💎 Crédits: <span id="credits">5</span>/5</p>
  </div>

  <div id="createBox">
    <div class="card">
      <label>Titre de ta musique</label><input type="text" id="title" placeholder="Ex: Stade de France">
      <label>Description / Prompt</label><input type="text" id="prompt" placeholder="Ex: Rap camerounais motivant">
    </div>
    <div class="card">
      <label>Paroles / Lyrics</label><textarea id="lyrics" placeholder="[Couplet 1]... [Refrain]..."></textarea>
    </div>
    <div class="card">
      <label>STYLE MUSICAL</label>
      <select id="style"><option value="rap camerounais">RAP CAMEROUNAIS</option><option value="rap melodique">RAP MÉLODIQUE</option><option value="trap">TRAP</option><option value="afrobeats">AFROBEATS</option><option value="bikutsi">BIKUTSI</option><option value="coupé décalé">COUPÉ DÉCALÉ</option></select>
      <label>TYPE DE VOIX</label>
      <select id="voice"><option value="male voice">VOIX MASCULINE</option><option value="female voice">VOIX FÉMININE</option></select>
      <div style="display:flex;align-items:center;gap:10px;"><input type="checkbox" id="instrumental" checked><label for="instrumental" style="margin:0;">Générer avec Instrumental</label></div>
    </div>
    <div class="card">
      <button class="btn" id="genBtn" onclick="generate()">✨ GÉNÉRER LA MUSIQUE -1 CRÉDIT</button>
      
      <div id="loadingArea" class="hidden">
        <div class="progress-bar"><div id="progressFill" class="progress-fill">0%</div></div>
        <p id="status" style="text-align:center;"></p>
      </div>
    </div>
  </div>

  <div id="playlistBox" class="hidden">
    <div class="card">
      <h3>📀 MA PLAYLIST</h3>
      <div id="playlist"></div>
      <button class="btn" onclick="showCreate()">⬅️ RETOUR CRÉATION</button>
    </div>
  </div>

  <!-- BOUTONS EN BAS -->
  <div class="card" style="background:transparent;border:none;">
    <button class="btn btn-blue" onclick="showPlaylist()">📀 VOIR MA PLAYLIST</button>
    <button class="btn-small" onclick="logout()">Se déconnecter</button>
  </div>

</div>

</div>

<script>
const REPLICATE_API_KEY = "r8_0ZJgjNFPfELRMTBy0cSWqK3tJCTU9Ar0nwgJA";
let user = JSON.parse(localStorage.getItem('rapverseUser')) || null;
let credits = parseInt(localStorage.getItem('rapverseCredits')) || 5;
let songs = JSON.parse(localStorage.getItem('rapverseSongs')) || [];
let progressInterval;

function showApp(){ document.getElementById('loginBox').classList.add('hidden'); document.getElementById('appBox').classList.remove('hidden'); document.getElementById('credits').innerText = credits; }
function signup(){ user = {email:document.getElementById('email').value}; credits = 5; saveUser(); showApp(); }
function login(){ user = {email:document.getElementById('email').value}; saveUser(); showApp(); }
function logout(){ user = null; localStorage.removeItem('rapverseUser'); location.reload(); }
function saveUser(){ localStorage.setItem('rapverseUser', JSON.stringify(user)); localStorage.setItem('rapverseCredits', credits); }
function showPlaylist(){ document.getElementById('createBox').classList.add('hidden'); document.getElementById('playlistBox').classList.remove('hidden'); renderPlaylist(); }
function showCreate(){ document.getElementById('playlistBox').classList.add('hidden'); document.getElementById('createBox').classList.remove('hidden'); }
function renderPlaylist(){ const playlistDiv = document.getElementById('playlist'); if(songs.length === 0){ playlistDiv.innerHTML = "<p>Aucun son créé</p>"; return; } playlistDiv.innerHTML = songs.map((s,i)=>`<div class="song-item"><b>${s.title}</b><br><small>${s.style}</small><audio controls src="${s.url}"></audio><a href="${s.url}" download="${s.title}.mp3">⬇️ Télécharger</a></div>`).join(''); }

const lastReset = localStorage.getItem('rapverseLastReset'); const today = new Date().toDateString(); if(lastReset!== today){ credits = 5; localStorage.setItem('rapverseCredits', 5); localStorage.setItem('rapverseLastReset', today); }

function updateProgress(percent){
  document.getElementById('progressFill').style.width = percent + '%';
  document.getElementById('progressFill').innerText = percent + '%';
}

async function generate(){
  if(credits <= 0) return alert("Plus de crédits");
  const title = document.getElementById('title').value; const prompt = document.getElementById('prompt').value; const lyrics = document.getElementById('lyrics').value;
  if(!title ||!prompt ||!lyrics) return alert("Remplis tout");

  credits--; saveUser(); document.getElementById('credits').innerText = credits;
  document.getElementById('genBtn').disabled = true;
  document.getElementById('loadingArea').classList.remove('hidden');
  updateProgress(0);
  
  // BARRE QUI MONTE JUSQU'A 90% PENDANT L'ATTENTE
  let progress = 0;
  progressInterval = setInterval(()=>{
    if(progress < 90){ progress += 1.5; updateProgress(Math.floor(progress)); }
  }, 1000);

  const finalPrompt = `${prompt}. Style: ${document.getElementById('style').value}. ${document.getElementById('voice').value}. Lyrics: ${lyrics}. ${document.getElementById('instrumental').checked? 'with instrumental' : 'a cappella'}`;

  try {
    const response = await fetch("/api/predictions", {
      method: "POST",
      headers: { "Authorization": `Token ${REPLICATE_API_KEY}`, "Content-Type": "application/json" },
      body: JSON.stringify({ version: "7be9d9f2e8c4a2b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0f1a2b3c4d5e6f7a8b9", input: { prompt: finalPrompt, duration: 30 } })
    });
    const prediction = await response.json(); if(prediction.error) throw new Error(prediction.error);
    const result = await pollPrediction(prediction.urls.get);
    const audioUrl = result.output.audio;
    
    clearInterval(progressInterval);
    updateProgress(100); // PASSE A 100% QUAND C'EST FINI
    
    songs.unshift({title, url: audioUrl, style: document.getElementById('style').value, date: Date.now()}); 
    localStorage.setItem('rapverseSongs', JSON.stringify(songs));
    
    document.getElementById('status').innerHTML = `✅ "${title}" prêt!`;
    
  } catch(e) { 
    clearInterval(progressInterval);
    alert("Erreur: " + e.message); 
    credits++; saveUser(); 
    document.getElementById('status').innerText = "❌ Erreur. Réessaie";
    updateProgress(0);
  }
  document.getElementById('genBtn').disabled = false;
}

async function pollPrediction(url){
  let attempts = 0;
  while(attempts < 40){
    attempts++;
    const res = await fetch(url.replace("https://api.replicate.com/v1", "/api"), { headers: { "Authorization": `Token ${REPLICATE_API_KEY}` } });
    const data = await res.json(); 
    document.getElementById('status').innerText = `IA en train de composer... ${attempts*4}s`;
    if(data.status === "succeeded") return data; 
    if(data.status === "failed") throw new Error(data.error);
    await new Promise(r => setTimeout(r, 4000));
  }
  throw new Error("Timeout");
}
if(user) showApp();
</script>
</body>
      </html>
