<!DOCTYPE html>
<html>
<head>
<title>RAPVERSE V7 PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{background:#0A0A0A;color:#fff;font-family:'Segoe UI',Arial;padding:20px;}
.container{max-width:700px;margin:auto;}
h1{color:#FFD700;text-align:center;font-size:42px;} h1 span{color:#00BFFF;}
.card{background:#111;border:1px solid #333;border-radius:20px;padding:20px;margin:15px 0;}
.btn{background:#FFD700;color:#000;border:none;padding:15px;font-size:18px;border-radius:50px;font-weight:bold;cursor:pointer;width:100%;margin:10px 0;}
.btn:disabled{background:#444;}
input,textarea,select{width:100%;background:#222;color:#fff;border:1px solid #444;border-radius:10px;padding:12px;font-size:16px;margin:8px 0;box-sizing:border-box;}
textarea#lyrics{height:200px;font-family:monospace;}
label{color:#FFD700;font-weight:bold;display:block;margin-top:10px;}
.credits{color:#00BFFF;font-size:20px;text-align:center;font-weight:bold;}
.hidden{display:none;}
.loader{border:4px solid #333;border-top:4px solid #FFD700;border-radius:50%;width:40px;height:40px;animation:spin 1s linear infinite;margin:10px auto;}
@keyframes spin {0% { transform: rotate(0deg);} 100% { transform: rotate(360deg);}}
small{color:#888;}
</style>
</head>
<body>
<div class="container">

<h1>RAP<span>VERSE</span> V7</h1>

<!-- LOGIN -->
<div id="loginBox" class="card">
  <h3>Connexion / Inscription</h3>
  <input type="email" id="email" placeholder="Ton email">
  <input type="password" id="password" placeholder="Mot de passe">
  <button class="btn" onclick="signup()">S'INSCRIRE +5 CRÉDITS</button>
  <button class="btn" onclick="login()">SE CONNECTER</button>
</div>

<!-- APP -->
<div id="appBox" class="hidden">
  <div class="card">
    <p class="credits">💎 Crédits restants: <span id="credits">5</span>/5</p>
    <button class="btn" style="background:#FF4444;color:#fff;" onclick="logout()">DÉCONNEXION</button>
  </div>

  <div class="card">
    <label>Titre de ta musique</label>
    <input type="text" id="title" placeholder="Ex: Roi de Yaoundé">

    <label>Description / Prompt</label>
    <input type="text" id="prompt" placeholder="Ex: Rap mélodique émouvant sur la persévérance">
    <small>Décris le mood, instruments, ambiance</small>
  </div>

  <div class="card">
    <label>Paroles / Lyrics</label>
    <textarea id="lyrics" placeholder="[Couplet 1]
Je viens de loin, j'ai galéré...
[Refrain]
Je suis le roi, roi de Yaoundé...
[Couplet 2]
..."></textarea>
    <small>Utilise [Couplet] [Refrain] [Pont] pour structurer</small>
  </div>

  <div class="card">
    <label>STYLE MUSICAL - 50+ CHOIX</label>
    <select id="style">
      <option value="rap melodique">RAP MÉLODIQUE</option>
      <option value="trap lourd">TRAP LOURD</option>
      <option value="drill">DRILL UK</option>
      <option value="afrobeats">AFROBEATS</option>
      <option value="rap conscient">RAP CONSCIENT</option>
      <option value="boom bap">BOOM BAP 90s</option>
      <option value="cloud rap">CLOUD RAP</option>
      <option value="phonk">PHONK</option>
      <option value="rnb">R&B</option>
      <option value="afro trap">AFRO TRAP</option>
      <option value="dancehall">DANCEHALL</option>
      <option value="reggae">REGGAE</option>
      <option value="bikutsi">BIKUTSI</option>
      <option value="makossa">MAKOSSA</option>
      <option value="amapiano">AMAPIANO</option>
      <option value="pop">POP</option>
      <option value="rock">ROCK</option>
      <option value="jazz rap">JAZZ RAP</option>
      <option value="lofi">LOFI CHILL</option>
      <option value="piano rap">PIANO RAP</option>
      <option value="gospel rap">GOSPEL RAP</option>
      <option value="comedy rap">COMEDY RAP</option>
      <option value="latin trap">LATIN TRAP</option>
      <option value="kpop">K-POP</option>
      <option value="electro">ELECTRO</option>
      <option value="house">HOUSE</option>
      <option value="techno">TECHNO</option>
      <option value="drum and bass">DRUM AND BASS</option>
      <option value="country">COUNTRY</option>
      <option value="blues">BLUES</option>
      <option value="soul">SOUL</option>
      <option value="funk">FUNK</option>
      <option value="metal">METAL</option>
      <option value="indie">INDIE</option>
      <option value="orchestral">ORCHESTRAL</option>
      <option value="cinematic">CINEMATIC</option>
      <option value="tropical">TROPICAL</option>
      <option value="zouk">ZOUK</option>
      <option value="coupé décalé">COUPÉ DÉCALÉ</option>
      <option value="ndombolo">NDOMBOLO</option>
      <option value="rap camerounais">RAP CAMEROUNAIS</option>
      <option value="rap francais">RAP FRANÇAIS</option>
      <option value="rap us">RAP US</option>
      <option value="emo rap">EMO RAP</option>
      <option value="hyperpop">HYPERPOP</option>
      <option value="synthwave">SYNTHWAVE</option>
      <option value="chillhop">CHILLHOP</option>
      <option value="trap love">TRAP LOVE</option>
      <option value="sad rap">SAD RAP</option>
      <option value="gangsta rap">GANGSTA RAP</option>
    </select>

    <label>TYPE DE VOIX</label>
    <select id="voice">
      <option value="male voice">VOIX MASCULINE</option>
      <option value="female voice">VOIX FÉMININE</option>
    </select>

    <div style="display:flex;align-items:center;gap:10px;margin:10px 0;">
      <input type="checkbox" id="instrumental" checked>
      <label for="instrumental" style="margin:0;">Générer avec Instrumental</label>
    </div>
  </div>

  <div class="card">
    <button class="btn" id="genBtn" onclick="generate()">✨ GÉNÉRER LA MUSIQUE -1 CRÉDIT</button>
    <div id="loader" class="loader hidden"></div>
    <p id="status"></p>
    <audio id="player" controls class="hidden"></audio>
    <a id="download" class="btn hidden">⬇️ TÉLÉCHARGER MP3</a>
  </div>
</div>

</div>

<script>
const REPLICATE_API_KEY = "r8_0ZJgjNFPfELRMTBy0cSWqK3tJCTU9Ar0nwgJA";

let user = JSON.parse(localStorage.getItem('rapverseUser')) || null;
let credits = parseInt(localStorage.getItem('rapverseCredits')) || 5;

function showApp(){ document.getElementById('loginBox').classList.add('hidden'); document.getElementById('appBox').classList.remove('hidden'); document.getElementById('credits').innerText = credits; }
function signup(){ user = {email:document.getElementById('email').value}; credits = 5; localStorage.setItem('rapverseUser', JSON.stringify(user)); localStorage.setItem('rapverseCredits', credits); showApp(); }
function login(){ user = {email:document.getElementById('email').value}; localStorage.setItem('rapverseUser', JSON.stringify(user)); showApp(); }
function logout(){ user = null; localStorage.removeItem('rapverseUser'); location.reload(); }

// RESET CRÉDITS CHAQUE JOUR
const lastReset = localStorage.getItem('rapverseLastReset');
const today = new Date().toDateString();
if(lastReset!== today){ credits = 5; localStorage.setItem('rapverseCredits', 5); localStorage.setItem('rapverseLastReset', today); }

async function generate(){
  if(credits <= 0) return alert("Plus de crédits. Reviens demain");
  const title = document.getElementById('title').value;
  const prompt = document.getElementById('prompt').value;
  const lyrics = document.getElementById('lyrics').value;
  const style = document.getElementById('style').value;
  const voice = document.getElementById('voice').value;
  const instrumental = document.getElementById('instrumental').checked;

  if(!title ||!prompt ||!lyrics) return alert("Titre + Description + Lyrics requis");

  credits--;
  localStorage.setItem('rapverseCredits', credits);
  document.getElementById('credits').innerText = credits;

  document.getElementById('genBtn').disabled = true;
  document.getElementById('loader').classList.remove('hidden');
  document.getElementById('status').innerText = `🔥 Génération de "${title}" en cours... 45-90s`;

  const finalPrompt = `${prompt}. ${style}. ${voice}. Lyrics: ${lyrics}. ${instrumental? 'with instrumental' : 'a cappella'}`;

  try {
    const response = await fetch("https://api.replicate.com/v1/predictions", {
      method: "POST",
      headers: { "Authorization": `Token ${REPLICATE_API_KEY}`, "Content-Type": "application/json" },
      body: JSON.stringify({
        version: "7be9d9f2e8c4a2b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0f1a2b3c4d5e6f7a8b9",
        input: { prompt: finalPrompt, duration: 30 }
      })
    });
    const prediction = await response.json();
    const result = await pollPrediction(prediction.urls.get);
    const audioUrl = result.output.audio;

    document.getElementById('player').src = audioUrl;
    document.getElementById('player').classList.remove('hidden');
    document.getElementById('download').href = audioUrl;
    document.getElementById('download').download = title + ".mp3";
    document.getElementById('download').classList.remove('hidden');
    document.getElementById('status').innerText = `✅ "${title}" est prêt!`;

  } catch(e) { alert("Erreur: " + e.message); credits++; localStorage.setItem('rapverseCredits', credits); }

  document.getElementById('genBtn').disabled = false;
  document.getElementById('loader').classList.add('hidden');
}

async function pollPrediction(url){
  while(true){
    const res = await fetch(url, { headers: { "Authorization": `Token ${REPLICATE_API_KEY}` } });
    const data = await res.json();
    if(data.status === "succeeded") return data;
    if(data.status === "failed") throw new Error(data.error);
    await new Promise(r => setTimeout(r, 4000));
  }
}

if(user) showApp();
</script>
</body>
        </html>
