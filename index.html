<!DOCTYPE html>
<html>
<head>
<title>RAPVERSE V7.1 PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{background:#0A0A0A;color:#fff;font-family:'Segoe UI',Arial;padding:20px;}
.container{max-width:700px;margin:auto;}
h1{color:#FFD700;text-align:center;font-size:42px;} h1 span{color:#00BFFF;}
.card{background:#111;border:1px solid #333;border-radius:20px;padding:20px;margin:15px 0;}
.btn{background:#FFD700;color:#000;border:none;padding:15px;font-size:18px;border-radius:50px;font-weight:bold;cursor:pointer;width:100%;margin:10px 0;}
.btn-blue{background:#00BFFF;color:#000;}
.btn:disabled{background:#444;}
input,textarea,select{width:100%;background:#222;color:#fff;border:1px solid #444;border-radius:10px;padding:12px;font-size:16px;margin:8px 0;box-sizing:border-box;}
textarea#lyrics{height:200px;font-family:monospace;}
label{color:#FFD700;font-weight:bold;display:block;margin-top:10px;}
.credits{color:#00BFFF;font-size:20px;text-align:center;font-weight:bold;}
.hidden{display:none;}
.loader{border:4px solid #333;border-top:4px solid #FFD700;border-radius:50%;width:40px;height:40px;animation:spin 1s linear infinite;margin:10px auto;}
@keyframes spin {0% { transform: rotate(0deg);} 100% { transform: rotate(360deg);}}
.song-item{background:#222;padding:10px;border-radius:10px;margin:8px 0;display:flex;justify-content:space-between;align-items:center;}
</style>
</head>
<body>
<div class="container">

<h1>RAP<span>VERSE</span> V7.1</h1>

<!-- LOGIN -->
<div id="loginBox" class="card">
  <h3>Connexion / Inscription</h3>
  <input type="email" id="email" placeholder="Ton email">
  <input type="password" id="password" placeholder="Mot de passe">
  <button class="btn" onclick="signup()">S'INSCRIRE +5 CRÉDITS</button>
  <button class="btn" onclick="login()">SE CONNECTER</button>
</div>

<!-- APP -->
<div id="appBox" class="hidden">
  <div class="card">
    <p class="credits">💎 Crédits restants: <span id="credits">5</span>/5</p>
    <button class="btn btn-blue" onclick="showPlaylist()">📀 MA PLAYLIST</button>
    <button class="btn" style="background:#FF4444;color:#fff;" onclick="logout()">DÉCONNEXION</button>
  </div>

  <div id="createBox">
    <div class="card">
      <label>Titre de ta musique</label>
      <input type="text" id="title" placeholder="Ex: Stade de France">
      <label>Description / Prompt</label>
      <input type="text" id="prompt" placeholder="Ex: Rap camerounais motivant">
    </div>
    <div class="card">
      <label>Paroles / Lyrics</label>
      <textarea id="lyrics" placeholder="[Couplet 1]
Je viens de loin...
[Refrain]
Stade de France..."></textarea>
    </div>
    <div class="card">
      <label>STYLE MUSICAL</label>
      <select id="style"><option value="rap camerounais">RAP CAMEROUNAIS</option><option value="rap melodique">RAP MÉLODIQUE</option><option value="trap">TRAP</option><option value="afrobeats">AFROBEATS</option><option value="bikutsi">BIKUTSI</option><option value="coupé décalé">COUPÉ DÉCALÉ</option></select>
      <label>TYPE DE VOIX</label>
      <select id="voice"><option value="male voice">VOIX MASCULINE</option><option value="female voice">VOIX FÉMININE</option></select>
      <div style="display:flex;align-items:center;gap:10px;"><input type="checkbox" id="instrumental" checked><label for="instrumental" style="margin:0;">Générer avec Instrumental</label></div>
    </div>
    <div class="card">
      <button class="btn" id="genBtn" onclick="generate()">✨ GÉNÉRER LA MUSIQUE -1 CRÉDIT</button>
      <div id="loader" class="loader hidden"></div>
      <p id="status"></p>
    </div>
  </div>

  <div id="playlistBox" class="hidden">
    <div class="card">
      <h3>📀 MA PLAYLIST</h3>
      <div id="playlist"></div>
      <button class="btn" onclick="showCreate()">⬅️ RETOUR CRÉATION</button>
    </div>
  </div>

</div>

</div>

<script>
const REPLICATE_API_KEY = "r8_0ZJgjNFPfELRMTBy0cSWqK3tJCTU9Ar0nwgJA";
let user = JSON.parse(localStorage.getItem('rapverseUser')) || null;
let credits = parseInt(localStorage.getItem('rapverseCredits')) || 5;
let songs = JSON.parse(localStorage.getItem('rapverseSongs')) || [];

function showApp(){ document.getElementById('loginBox').classList.add('hidden'); document.getElementById('appBox').classList.remove('hidden'); document.getElementById('credits').innerText = credits; }
function signup(){ user = {email:document.getElementById('email').value}; credits = 5; saveUser(); showApp(); }
function login(){ user = {email:document.getElementById('email').value}; saveUser(); showApp(); }
function logout(){ user = null; localStorage.removeItem('rapverseUser'); location.reload(); }
function saveUser(){ localStorage.setItem('rapverseUser', JSON.stringify(user)); localStorage.setItem('rapverseCredits', credits); }

function showPlaylist(){ document.getElementById('createBox').classList.add('hidden'); document.getElementById('playlistBox').classList.remove('hidden'); renderPlaylist(); }
function showCreate(){ document.getElementById('playlistBox').classList.add('hidden'); document.getElementById('createBox').classList.remove('hidden'); }

function renderPlaylist(){
  const playlistDiv = document.getElementById('playlist');
  if(songs.length === 0){ playlistDiv.innerHTML = "<p>Aucun son créé</p>"; return; }
  playlistDiv.innerHTML = songs.map((s,i)=>`
    <div class="song-item">
      <div>
        <b>${s.title}</b><br>
        <small>${s.style} - ${new Date(s.date).toLocaleDateString()}</small>
        <audio controls src="${s.url}"></audio>
      </div>
      <a class="btn" style="width:auto;padding:10px;" href="${s.url}" download="${s.title}.mp3">⬇️</a>
    </div>
  `).join('');
}

// RESET CRÉDITS
const lastReset = localStorage.getItem('rapverseLastReset');
const today = new Date().toDateString();
if(lastReset!== today){ credits = 5; localStorage.setItem('rapverseCredits', 5); localStorage.setItem('rapverseLastReset', today); }

async function generate(){
  if(credits <= 0) return alert("Plus de crédits");
  const title = document.getElementById('title').value;
  const prompt = document.getElementById('prompt').value;
  const lyrics = document.getElementById('lyrics').value;
  const style = document.getElementById('style').value;
  const voice = document.getElementById('voice').value;
  const instrumental = document.getElementById('instrumental').checked;
  if(!title ||!prompt ||!lyrics) return alert("Remplis tout");

  credits--; saveUser();
  document.getElementById('credits').innerText = credits;
  document.getElementById('genBtn').disabled = true;
  document.getElementById('loader').classList.remove('hidden'); // LE LOADER TOURNE ICI
  document.getElementById('status').innerText = `🔥 Génération de "${title}" en cours... Patiente 60-120s`;

  const finalPrompt = `${prompt}. Style: ${style}. ${voice}. Lyrics: ${lyrics}. ${instrumental? 'with instrumental' : 'a cappella'}`;

  try {
    const response = await fetch("https://api.replicate.com/v1/predictions", {
      method: "POST",
      headers: { "Authorization": `Token ${REPLICATE_API_KEY}`, "Content-Type": "application/json" },
      body: JSON.stringify({ version: "7be9d9f2e8c4a2b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0f1a2b3c4d5e6f7a8b9", input: { prompt: finalPrompt, duration: 30 } })
    });
    const prediction = await response.json();
    if(prediction.error) throw new Error(prediction.error);
    
    const result = await pollPrediction(prediction.urls.get);
    const audioUrl = result.output.audio;
    
    // SAUVEGARDE DANS PLAYLIST
    songs.unshift({title, url: audioUrl, style, date: Date.now()});
    localStorage.setItem('rapverseSongs', JSON.stringify(songs));
    
    document.getElementById('status').innerHTML = `✅ "${title}" est prêt! <button onclick="showPlaylist()">Voir dans Playlist</button>`;
    
  } catch(e) { 
    alert("Erreur: " + e.message); 
    document.getElementById('status').innerText = "❌ Erreur. Réessaie";
    credits++; saveUser(); 
  }
  
  document.getElementById('genBtn').disabled = false;
  document.getElementById('loader').classList.add('hidden'); // LOADER S'ARRÊTE
}

async function pollPrediction(url){
  let attempts = 0;
  while(attempts < 40){ // Max 2min40
    attempts++;
    const res = await fetch(url, { headers: { "Authorization": `Token ${REPLICATE_API_KEY}` } });
    const data = await res.json();
    document.getElementById('status').innerText = `🔥 Génération... ${attempts*4}s écoulés`;
    if(data.status === "succeeded") return data;
    if(data.status === "failed") throw new Error(data.error);
    await new Promise(r => setTimeout(r, 4000));
  }
  throw new Error("Timeout");
}

if(user) showApp();
</script>
</body>
  </html>
